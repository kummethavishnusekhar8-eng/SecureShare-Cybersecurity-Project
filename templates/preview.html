{% extends "base.html" %}

{% block title %}Preview | SecureShare{% endblock %}

{% block content %}

<div class="container py-5">

<a href="/files"
class="btn btn-secondary mb-4">

<i class="bi bi-arrow-left"></i>

Back

</a>

<div class="card shadow">

<div class="card-body">

<h3>

{{ file.filename }}

</h3>

<hr>

{% if extension in ["png","jpg","jpeg","gif","webp"] %}

<img
src="/download/{{ file.id }}"
class="img-fluid rounded">

{% elif extension=="pdf" %}

<iframe
src="/download/{{ file.id }}"
width="100%"
height="700">

</iframe>

{% elif extension=="txt" %}

<iframe
src="/download/{{ file.id }}"
width="100%"
height="600">

</iframe>

{% else %}

<div class="alert alert-warning">

Preview unavailable.

</div>

{% endif %}

</div>

</div>

</div>

{% endblock %}
